body:
  text: 侍者德林記真讚出山文殊大士并敘攝大千於一毫端中收法界於微塵影裏鞭草血流頑石吼聲此蓋文殊普賢大人境界非諸凡小而能信受惟證者知之耳豫觀永豐隱上人所存出山文殊師利之相神觀靖深儀容淡遠如性起妙德未曾度再使豫深生渴仰謹拜首稽首為之讚曰從一毛端上突出金剛圈倒騎雲中獸還我未生前手中如意得自在剎剎塵塵午夜天須菩提千山與萬山都在腳板底一鉢與一杖多嗔而少喜倩我來題讚萼開於碓嘴咦從此播揚於諸方百衆人前喚不起初祖本維那請西天既無此土安有別井離鄉枉自生受梁王殿上納敗一場少室門中罕見知有一瓢一履在人前面皮曾有幾多厚木禪千萬莫學伊學伊和你一下醜咦日月逝兮且頻頻猴愁樓兮狗走𢪠趙松雪十六羅漢圖仁敘畫家之妙在元世松雪盡之矣松雪不獨草萼木石山水翎毛而猶刻意人物兼擅諸家諸家不能較一籌者此十六大阿羅漢是其一也神情杳靄悠然靖深去千百年生氣還發光相奪人不待維摩大士入不二門而超然火點明燈者金沙李君龍孫得之古郢歸以示豫遂再拜稽首為之讚曰古藤摵碎楊萼夢疾栗空山水霞凍赤腳撐開去路行野調無絃再三弄趙家畫譜古今騰韓幹道子孰焉勝幹唯畫馬無他說道子傳神亦可矜豈如此卷光芒久情怡意暢猶相守厥工靜悍毛髮寒冷焰驅馳煙波走二八阿羅去就輕停停滄海夜空沉普陀嵒下尋高士碧浪堆前問故津曾索龍眠繪煙下於今趙氏猶堪把精微浩豁臨天人欲使空生遙讚野金沙有叟李龍君軒昂大坐遠囂氛相逢尚不言祖意何暇去補南天雲藥王大士有敘大士之載方冊也事多不同或謂肇自神農以其射味百草作療億兆後世遂以藥王預焉首楞嚴謂藥上藥王同為昆季遍探大地旋味旋知證圓通門味因為上成法王子而法華又謂出於妙莊嚴王未詳孰是此特就其所知而言爾漢陰李子持大士像俯祈讚詠發揚流布豫懼朝三暮四恐多為大士哂者遂再拜稽首為之讚曰本來無病亦無此想見聞覺知如拳與掌手本自然拳掌各偏咄哉神農起病之源百草才嘗平者自顛況復藥王而為先導證味圓通能用能照萬世儀型當明而妙智藥療心世藥療身維心與身瓶盂一金智之與世二義儼存我以正眼觀此法門如箭中的如水合冰掌拳之義事合如此非即非離乃疆乃理卓彼太虛風動塵起稽首藥王如是而已聚雲老和尚曠百世而上視億代以下無釋迦無彌勒雲興霞蔚海湧波飛星移霧馳至我師翁我師翁起十四隆之道鏗鏗其揚玉玉其彰如雷如霆浩浩汗汗小子所以弗敢拜首伸辭鳴鐘伐鼓者為其道大而不能覆藏也慶忠老和尚巴勒不死宣杲未亡二千年不揚之化日而月之七百歲未整之綱大啓廟廊雷發濤立玉振金聲海宇之人欲模形而無路豈後生小子能摸索其鬚龐老師宿德跂之斗絶電光石火追之未嘗夫是之謂岷江古佛安不為之燒香散萼時時日日日日時時勤勤供養東明甫和尚碎臨濟金剛寶劍大振西川斷雙徑攪地之龍稱雄法海德嶠之手雪峰之口一條竹篦活如蛇兩樹孤眉絶如斗如斗絶似青萍凜凜高風淡淡微痕我今讚禮稽首要問渠是何人良久云果然慶忠老人之嫡子即是長龍至善之法兄題靈然禪宿像謂公是大闡提人卻又輪珠在掌謂公是善演法人卻又離言說相且喜一段胸懷到處隨緣放曠袈裟杖鉢依身梵貝香萼是傍更有一著過人處要你自裁自量彭君甫居士小像維摩再世龐老重來佛祖至道豈偶然哉雖居聲色不墮塵埃大火聚中優鉢華開示無言說其猶春雷惟道人陳好肉作災湘水悠悠湘山崖崖不憚艱險千里持來智子啓豫拜首庭階彭君久親卻不是才俯祈讚詠福彼孫孩子方晏坐出緣生海安詳而起指顧蒼苔命管城君想像音偕是耶非耶且掛高齊乳成酥酪金置瓶叉要識彭君清風下載題總持道人小像柔順利貞坤道儀型冰清玉粒如木舍熏佐相夫子女中之英持家治業率先以身幽閒鎮靜閭巷皆欽易言舍章君子所尊宜爾子孫螽斯衍慶吾聞先聖降跡人倫或為帝女或現王臣終不自言蠱惑生民唯除命終陰有遺音彭氏道人皈豫多春字曰總持諱曰德聞龐家之婦氏之母為厭五濁樂斯淨土幻海波清月臨當戶徹鑑上座請題飛鳴宿食寒鴈圖何處飛來雙羽輕霜天月下一聲聲分明夢在蘆萼裏只為饑虛到鳳城自讚爇南天之木話東海之濱計算在驢年前後收效於空外垂輪伐毛洗髓鏤臀斫筋以為龍驤雲聚虎嘯風生大似鎮州出曹門如說如行無一法為天下式而欲步夫古之後塵其人其人慚惶積得三兩村淳奕禪人請題惟證大師小像我未見其表求豫為之讚望空而啓告非謗即成訕想像古儀容依稀舊公案春至百華香雨過千峰淡惟有過量人達此無邊岸證成無作心非秦亦非漢奕禪持此歸展向虛堂畔偈頌青州頌送靈峰禪人青州衫子搆未得何處披來拜祖翁趙州老人好解事到處逢渠撞木鐘我做沙彌領略時科頭負痛有誰知頻年喫盡辛酸苦畫餅不能療朝饑是時乃謂豈如此丈夫窮源須到底放下雲頭與麼參不扣他人扣自己忽然摸得現前句有口難為對君訴潦倒白雲屋數間買絲閒過青楓渡從頭細算茶鹽錢撿點環溪幾樹煙一歸何處處何說夜行船載明月圓趙州老趙州老別處討鎮海明珠不在南無端傾出一栲栳壽彭君甫居士江水重添百尺波贈君圖畫又奚何我庵恰在晴川岸兩地風光未較多秪有尋常一段事與君話說非關戲勿耽靜妙與空沉天外出頭非所思龐老曾參馬簸禪西江吸盡又涓涓而今露滴依然在浸殺渠儂鼻孔酸蓋天蓋地如何說胸次突然自天則言前薦取已天涯句後承之爭見得到此如何為君壽聊通一線非虛謬黃鶴樓在江之南大別峰從漢水右破屋吟鑿穿鼻孔娘生路薦得渠儂第二句牢把肝腸反覆看虛簷漏壁清光吐春雨夜來水國分舊履如舟信不聞是日天明經磉下未全之器那堪文小窗故硯偏知有動豫書笈呵雙手細展楊岐屋裏情光芒何患肘生柳袁州小院古名庭錯落珠珍冷袖馨來日上堂嗟漫項令人空自想先靈破陋由來莫可把飛光散玉無冬夏只為頂門一線天室內從他飛野馬悼高峰億和尚歸根聞道葉非遙強展雲箋雨淚拋薄幸法門何太苦千筋擔子倩誰挑奉命持衣到楚天為豫鉢袋尚悠然岷山萬里空長在淚落晴江冷逝川挽東明眉山和尚力荷宗綱二十年慣拈白刃示參玄晚來更有堪傳處赤腳捎空上錦川尚臨終偈有赤腳上西川之句憶昔同參老慶忠每成荒句羡豫工牛山竟夜松風亂殿閣今惟冷畫中偶憶當初談笑裏先師強健送行時野田淡晚蒼煙外留得空亭翠幾枝胡波清霽曉江開幾度傾思想舊懷門戶潑天何日啓援毫空把淚珠來夜坐屋角江聲送遠汀過窗斜月影初停夜來小鼠窺禪室半匣寒光映膽瓶補船半載閒雲半載空老漁無意理衰篷凄涼煙雨湘江岸絲網徐垂緑水中幾年活計在江湖秋雨蘆林對遠浦聞道維揚風色好卻乘煙棹下三吳棹尾漁童小樣身未通水性向人詢疑他懷老離丹翠想見青絲破晚春荒草無情是幾秋南湖初月漾江流歸帆倒影疏星外誰道飛槎犯斗牛答澴川諸子前年偈語多寥落此日談心味覺深石塌無錢可堪供暮雲催鳥出高林鏡湖法華庵募修圍墻請言桃李晴陰缺一圍遺來山市想非衣當年愧殺祗圍事此日何妨回竹扉師因學者往往多不薦竹篦子話久之乃演成六頌畢竟喚作甚麼肝膽一時盡露直饒伶俐衲僧到此猶較百步畢竟喚作甚麼初三初四初五拈來色色現成何用禾山打鼓畢竟喚作甚麼擬議知君不是蓋天蓋地一著不比尋常小事畢竟喚作甚麼非龍非神非鬼咨爾參玄上人何妨直下薦取畢竟喚作甚麼一齊為你說了現前不假思惟何用南詢諸老畢竟喚作甚麼當人切須仔細照顧頭上霹靂撒手懸巖在此師因學者請益世尊初生話不契師意者再進師曰聽取一頌平生尊貴忽然墮莫是羅㬋入命宮南北東西無著處是誰收在一塵中送行腳削竹為杖刳木為瓢蹈襲春衢以歌以調趙州驢腳過橋斷橋風吹古道不消不消古道無已窮之無底問水尋山倣佛千里千里持來捨事就理哀今之人如是而已蹈古驅今料水打碓多少癡兒隨行逐隊費草鞋心把春風碎退一取三裂機而對世事如也都莫可把朝東暮西驟馳乎下不知明鏡為君傾瀉咨爾禪流無從打瓦古德十頌初祖冷壁挨將九箇春剛才東到又西行宋雲蔥嶺相逢日無限癡腸徹底傾黃檗大唐國裏何消說不道無禪是沒師沙場自古無人到總為腥風遠嶠迷睦州蚯蚓驀過東海水大藏小藏拔不起活計生涯說現成現成何必來問你德山一口吹殘燭影滅師長恩愈海樣深溈山老大無人相為爾全拋一片心嵒頭堂上高呼末後句雪峰飯裏有生氣山頭老漢空鉢回莫把從前當小事雪峰山店上機緣熟打轉當年七尺身須知更有超宗句庵內誰分庵外人雲門靈樹口邊已漏泄入門枉把關兒裂神光腦後再添椎抖擻屎腸為你說法昌機裏呈機爭見得新磨大斧霜華色小搆精廬山之傍杖子橫吞潭底月浮山好怪兒郎不識羞才開鋪面擬來求罰錢擯打無餘說總要渠儂得自由雲峰化米方歸尋化炭緣疏才交堂裏換須知老漢有肝髑者盆頭光爛爛日用偈有敘湧泉四十年打成一片趙州使得十二時晦堂伏後方得事事如理信腳尖頭上也踢出箇佛來三老人可謂病多諳藥性得效敢傳方也余世緣深重道力衰微作日用十章非敢妄比隆三老之長實所以痛自治焉於一切境郭遍塵沙了彼世間夢幻空華精粗隨分母妄貪著念彼落迦安然自樂萬事隨緣勿生貪著念髻中珠忍把錯落順逆之境不可計憶正眼觀來空萼問蒂本無活計安有倒想清淨界中勿使遮障寂滅性海隨汝啖啄擬欲求之千錯萬錯一念不起其病尤深大火聚中拾取一莖稱性之印豈用思惟迅雷不及電火難追拈一莖草切勿顧佇那吒喪威作者罔措神符密印那怕爛著示與非人不如燒卻紫雲山藥師聖燈成擔公禪師請頌海印停涵四面時玉光遙向盞中施無根樹裏勤栽植照耀人天不可思樹雲深鎖夜珠寒海湧金蟆萬姓歡不是如來親指示幾年幽壤盡迷漫重重玉蕊出龍脣漏出些兒越樣新莫是心萼時一粲枝枝勇出少林春大光明藏絶羅籠照徹音雷劫外空今日拈來堪一笑通身遍體自玲瓏贈鑑上座戒珠頌有敘豫昔隱居象山距三角不一俱盧舍鑑公與豫朝往夕返尚矣逮豫主領萬峰與三角又隔一帶水略為險遠而公與豫神往契洽有不可解丙寅冬偶因四來禪學請演毗尼法於山中公不畏寒霜弼於荒墅豫因觀近代時風深為長喟如鑑公者豈多得哉因作戒珠言二章為異日法中左券云戒珠圓淨逼天涯錦縫重重秋故家回首遠山蒼緑隱夕陽西射晚峰斜眉宇豁開鴻陳外海山依舊畫圖新勞勞亭畔敲春雪誰聆清商向紫宸示松書狀并敘甲子春豫始領萬峰石松來參便問生死到來那裏是安身立命處老僧向他道無間地獄裏松於此稍知些屎臭氣是秋因事出山往芙蓉大溈福森諸處咸有印授松始終不忘豫無間獄話聿來湘中依實供通不忘所自固知渠非近來趨火赴炎者此子嘉其為人因書二偈昭示來者躍冶精金非瑣碎前箭猶輕後箭深毛錐子上翻身轉箇是出頭天外人叩豫安身立命處波吒無間一悠哉不是等閒相誑惑老僧曾向此間來示寶明寶明妙性不離塵勞瞻之仰之惟此最高示行滿水月空華無在不在如是修持六賊自敗示靈應塵勞之儔為如來種左右逢原隨機變動示長源其流既清其源必長方知海印只在尋常示涵照坐臥去來惟憑空慧達本還源不須理會示初修無上寶印照耀兩間惟在力修莫作等閒示清和雲廓天際海浪澄波無邊剎境不離愛河示見升如月之恆如日之升迥超群象爍彼太法示慧力一塵翳天一芥墜地慧力難思是真實義示惺源伸手摸著舉步踏著日用尋常惟汝自樂僧請益德山托鉢話師拈杖約退僧再進師曰我恁麼泥水自合喫一頓了僧曰豈無方便師便打僧曰某甲話也未問因甚便打師曰汝作如是會耶隨後又打僧禮拜師曰聽取一頌太阿冷處逼人寒潦倒嵒頭把事探若向三年尋活計白雲依舊覆青山臨濟示衆云山僧今日見處與佛祖不別若第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了第一句不向劫空求寸地那容栖泊未生時夜來得箇楊州夢騎鶴腰錢過隴西第二句才涉言思已不堪擬裝珍御好羞慚林稍未見羚羊術和煙摧折玉闌干第三句諸佛衆生水上波四海參尋會也麼只因病入膏肓甚空令歲月易蹉跎第一玄爍然全無縫從教海嶽昏打破秦時鏡內外絶疏親第二玄扷去眼中屑抽來腦後箭不動一絲頭請觀舊時面第三玄出頭天外去何處是爾家面前三畝地只合種桑麻第一要第一要迥絶威音兆四面沒遮攔無容通鳥道第二要第二要無人踏得到唯有謝三郎撥轉蘆灣棹第三要第三要華亭剛罷釣一橈落水中拈了膱脂帽先照後用先照後用電掣雷轟只知驟雨不見游龍先用後照先用後照孫臏減灶事在臨時無容作造照用同時照用司時作者須知思量擬議便落今時照用不同照用不同南北西東隨處作主遇緣即宗又示衆云有時一喝如金剛王寶劍金剛王劍無容擬議擬犯其鋒伏尸萬里有時一喝如踞地獅子踞地獅子其風凜冽不動纖塵諸聖腦裂有時一喝如探竿影草探竿影草不遲不早大用現前紅日杲杲有時一喝不作一喝用不作喝用何曾定動趁得老鼠打破油瓮佛事為東明和尚入龕以杖指龕云本無位次底人卻有位次本無安排之地合共安排雲從龍風從虎南北東西不覆藏此是吾兄真落處且道落在甚處以手指龕封龕者條金鎖玄路以被法兄把斷久矣還要如何折合顧衆云一齊緊封密釘起龕盡大地承他不起盡法界籠他不住去此二途合作麼生道卻請老法兄證盟秉炬兄為弟持衣而來弟為兄送行而去雖然來去不同途要知各有出身一路且如何是出身一路飛星過水和天碧日出屏南嶺外看收骨捧骨云今辰乃二月十日午時了只者時節我法兄本不曾生天蓋地擎我法兄本不曾滅光前顯後白雲去而復還閒鳥飛而弗度此猶是現前句子尚未見末後句子敢問諸人何名末後句子以骨送瓶云高著眼為心一上座封棺拈杖云淨法界身本無出沒大悲願力示有去來如是則生而無生又拈杖云真如淨境界一泯未常存能隨染淨緣遂成十法界如是則滅元非滅既無生滅心公上座畢竟歸之何處我聞并信受都是假名陳起棺天不能覆地不能載心公上人得大自在見麼繡出鴛鴦著眼看會得金針在誰手下火豎火炬云井星入斗牛彤雲眠玉兔豁開三要關便是生前句既是生前句也須煆過始得安骨以手指瓶云外內虛敞止正吉祥是安樂法是解脫場千聖齊立下風萬靈一一斂藏若能如是上座權且踜著雲石禪人請為亡師佛智禪宿封龕以手指龕云此大解脫法門惟我佛智禪宿證入久矣現前諸人有眼者共見有耳者共聞既是聞見分明但請一齊封釘始得起龕驀拈杖云不動道場烜赫威光智公於此要行即行要去即去何有障礙直饒山僧到來鼓兩片皮已是無端了喝一喝下火豎火炬云紅日照山村白雲藏玉兔無二無二分無別無斷故此箇時節乃智公禪師放身捨命之時同里分中卻又如何餞送良久云欲得腦後神光現須從滔裏捨莖毛為聖則禪人起龕清淨界中本無遮障平白地上卻有淆訛則禪人惺惺著玄關金鎖一時開脫卻籠頭卸卻角馱喝一喝下火以火炬指云大光明藏迥絶羅籠本色場中了無遮障吾兒撒手還鄉莫守寒巖景象絶幻妄之根苗脫群生之伎倆好乘般若大舟航莫肖南浦三生上遂下火為自隱禪人起龕驀召靈室云自隱盡天地是罏炭鑊湯汝作麼生來盡大地是刀山劍樹汝作麼生去師微哂曰幸有這條路許汝出入便起下火師以炬指云目前無闍黎逼塞虛空此間有老僧白雲萬里今日良辰美景節屆應鐘乃我自隱上座放捨四大之時老僧只得打開大涅槃門掀倒寂滅性海使汝撒手還鄉榮家樂業還知麼惡水潑來成第二鈍根錯過問前三遂攛下火炬為蘊空禪人起龕師召云蘊空者段烜赫威光汝未遇山僧時亦何曾減今日山僧送汝出山又何曾增既無增減渾是一箇安樂法門汝可撒手還家受用自在那裏是撒手處喝一喝下火師以火炬指云大火聚裏不許藏身此是汝安身處塗毒鼓邊未容側耳此是汝信受處汝於淨山建立功隆迎請山僧開正法眼此是汝將來受用處惟有末後一句未容無說還知麼以火炬畫圓相云無量光中自在身等閒莫受他家惑遂下火寶慶府邵陽縣弟子王之明率男王鼎合鼎玉捐資流行萬峰童真和尚語録卷二惟冀當來世中一聞千悟得大總持
