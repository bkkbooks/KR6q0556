body:
  text: 童真和尚語錄序迦文之道自菩提達磨來我東華至臨濟為大振徑山為再振山十四傳及明啟禎間而有聚雲吹萬老人宗風丕顯聲藉一時吾蜀自宋元以來未有能或之先也老人高弟有三首曰慶忠鐵壁禪師如聖門之顏子予童時即聞其名錦江玉壘上至王侯卿士下及黎庶編氓無不欽承折服師出世三十餘載均嗣法者自朝宰士夫而外親承入室僅十八人童真和尚居第十焉師乃吾郡相國江公之後太守年伯海籌公之少子也與予稱世好師自髫時穎異絕人能目過成誦予嘗下之先年伯靡不以隆顯是望而師淡如也三十年來鴈杳魚沉辛酉之春客有來京師者以師語錄見示予且駭之始知師荷擔釋門為一代知識承徑山之後矣嘗憶予與師窗下時每談世外空宗之學則津津然而於政事文章則藐焉頤佇退而與家君言之安知今日之舉豈非疇昔之意也哉信之出世丈夫果富貴功名之所難單威武貧賤之莫屈移先儒之言誠不誣矣間讀傳燈見崔欽因緣謂出家乃大丈夫事雖將相有所不能予以為妄今覲禪師以高門華胄如是體才蚤能擺脫紅塵秕糠富貴上躋祖域成一代之宗師豈非大丈夫也哉予也桎梏一官碌碌塵勞日月逝兮去師遠矣何時解此束縛與師相聚於古松流泉間一洗塵纓是所願也至語錄一道予且未夢安敢負水河濱置糞佛頭聊述師之始末為同人輩一臻勸善云爾賜進士出身前翰林院太常寺少卿今奉旨巡撫江西戶部左侍郎郡人劉如漢撰萬峰和尚語錄題辭大慧老人說法如雲如雨語錄三十卷具存龍藏參學家尊為天球河圖一披其書宛若面命耳提傳燈所載能有幾人竊怪其嗣裔寂寥淨慈以下不見燈錄意必有默契潛證克家嫡傳者隱於山陬海澨如西山大梅其人而吾又未之見也今年公車罷後自孝昌抵漢陰買舟東歸借宿九蓮僧舍或謂予曰此間有一禪師嗣法大慧子知之乎予愕然曰天下寧有是哉大慧去今五百年矣安所授受得母謬歟或者英彥挺生從大慧錄中打失眉毛飲水溯源不忘所自因而遙承如古塔主之嗣雲門者殆未可知也次日走晴川詣臥雲問所謂童真和尚者闃然不在止晤一雲水上人坐而詢焉答曰非謬也亦非遙承也蓋大慧之嫡嗣隱於梁岷之間累代不絕元元本本灼有定據此則其後裔耳予益加迷悶愕然曰天下寧有是哉大慧去今五百歲矣繩武繼徽燈錄缺如即有授受安所憑藉歟終夕躊躕不遑安寢詰朝再走晴川詣臥雲披簾啟戶而童真和尚儼然迎焉觀其狀貌莊而且和聆其言辭條而有章考其付受之次第自西禪需傳鼓山永永傳淨慈明明傳苦日益益傳筏渡慈慈傳一言顯顯傳小菴密密傳二仰欽欽傳無念有有傳荊山寶寶傳鐵牛遠遠傳月明池池傳吹萬真真傳鐵壁機迄十五代確而有證閱其祖先之錄暢而有文廣而不雜宏而不肆既乃讀其開法之語與贈答之偈豁然而曠達秀外而惠中波瀾大見識寬所謂善說法要稱法性說其母乃大慧再來乎不然何以酷肖若祖也嗟乎今天下紹臨濟者虎丘一枝獨步震旦而已即斷橋而下猶且若存若滅渾無稽考矧慧祖之後久而鮮徵其能免於悠悠之疑論乎然則童真和尚當絕續之關履方新之會振千載已墜之緒乘一絲九鼎之勢危同投子微等風穴挽頹綱而振新猷剪稠林以扶落暉予安能不重望之和尚哉其函出之以告叢林母令徑山窌塔久淹豐艸也康熙丁未孟夏吉州學人屏山李道濟龍孫和南題目次序示眾法語真讚偈頌機緣雜著宗統頌華嚴圓頓頌湘山頌古
